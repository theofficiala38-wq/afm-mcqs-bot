name: 🚀 Deploy AFM MCQs BOT

# ══════════════════════════════════════════════════════════════════
#  يُشغَّل تلقائياً عند:
#  1. رفع index.html على main/master (من الأدمن يدوياً أو عبر GitHub API)
#  2. تعديل أي workflow file
#  3. تشغيل يدوي من واجهة GitHub Actions
# ══════════════════════════════════════════════════════════════════
on:
  push:
    branches:
      - main
      - master
    paths:
      - "index.html"
      - ".github/workflows/**"
  workflow_dispatch:
    inputs:
      force_version:
        description: "تجاوز APP_VERSION بتوقيت جديد (اتركه فارغاً لاستخدام القيمة المضمّنة في الملف)"
        required: false
        default: ""

# ──────────────────────────────────────────────────────────────────
#  صلاحيات GitHub Pages (مطلوبة)
# ──────────────────────────────────────────────────────────────────
permissions:
  contents: read
  pages: write
  id-token: write

# ──────────────────────────────────────────────────────────────────
#  منع التشغيل المتزامن لنفس بيئة النشر
# ──────────────────────────────────────────────────────────────────
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ════════════════════════════════════════════════════════════════
  #  JOB 1 — التحقق من سلامة الملف وأمانه
  # ════════════════════════════════════════════════════════════════
  validate:
    name: ✅ فحص الملف وسلامة البيانات
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout المستودع
        uses: actions/checkout@v4

      # ── 1. التحقق من وجود الملف وحجمه المعقول ──────────────────
      - name: 📦 فحص حجم الملف
        run: |
          if [ ! -f "index.html" ]; then
            echo "❌ index.html غير موجود في جذر المستودع!"
            exit 1
          fi
          SIZE=$(wc -c < index.html)
          echo "📦 حجم الملف: ${SIZE} بايت"
          # الملف الصحيح لا يقل عن 50KB (يحتوي CSS + JS + Base64 بيانات)
          if [ "$SIZE" -lt 51200 ]; then
            echo "❌ الملف صغير جداً — تأكد من استخدام 'تصدير الموقع' وليس ملف فارغ"
            exit 1
          fi
          echo "✅ حجم الملف مقبول"

      # ── 2. التحقق من وجود العلامات الأساسية للتطبيق ─────────────
      - name: 🔍 فحص بنية HTML
        run: |
          FAILED=0
          declare -a MARKERS=(
            "AFM MCQs BOT"
            "APP_VERSION"
            "__SEED__"
            "Cache-Control"
            "no-cache"
            "toggleTheme"
            "publishToGitHub"
          )
          for marker in "${MARKERS[@]}"; do
            if grep -q "$marker" index.html; then
              echo "✅ وُجد: $marker"
            else
              echo "❌ مفقود: $marker"
              FAILED=1
            fi
          done
          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "❌ الملف لا يبدو ملف AFM MCQs BOT صحيح — تأكد من استخدام 'تصدير الموقع' من لوحة الأدمن"
            exit 1
          fi
          echo "✅ بنية HTML سليمة"

      # ── 3. فحص أمان التوكن ──────────────────────────────────────
      # التوكن لا يجب أن يكون موجوداً في الملف أبداً
      - name: 🔒 فحص أمان التوكن (يجب ألا يكون موجوداً)
        run: |
          # GH_ENCRYPTED يجب أن يكون سلسلة فارغة في الملف المُصدَّر
          if grep -qP "var GH_ENCRYPTED\s*=\s*'[^']{20,}'" index.html 2>/dev/null || \
             grep -qE "var GH_ENCRYPTED\s*=\s*'[^']{20,}'" index.html 2>/dev/null; then
            echo "🚨 تحذير أمني: يبدو أن إعدادات GitHub المشفّرة مضمّنة في الملف!"
            echo "   هذا ليس خطراً مباشراً (الإعدادات مشفّرة بكلمة السر) لكن يُفضَّل أن تكون فارغة."
            echo "   إذا كنت تقصد ذلك، تجاهل هذا التحذير."
          else
            echo "✅ لا يوجد توكن ظاهر في الملف (صحيح)"
          fi

      # ── 4. فحص وجود الأسئلة (seed data) ──────────────────────────
      - name: 📚 فحص بيانات الأسئلة
        run: |
          # __SEED__ يجب ألا يكون null (يعني الأدمن صدّر الملف مع أسئلة)
          if grep -q "var __SEED__=null;" index.html; then
            echo "⚠️  تحذير: __SEED__ = null — لا توجد أسئلة مضمّنة في الملف"
            echo "   سيُعرض للمستخدمين الأسئلة النموذجية فقط."
            echo "   إذا أردت تضمين أسئلتك، ارفع الأسئلة من لوحة الأدمن ثم استخدم 'تصدير الموقع'"
          else
            SEED_LEN=$(grep -o "var __SEED__=.*;" index.html | wc -c)
            echo "✅ توجد أسئلة مضمّنة في الملف (حجم البيانات: ~${SEED_LEN} حرف)"
          fi

  # ════════════════════════════════════════════════════════════════
  #  JOB 2 — البناء والنشر على GitHub Pages
  # ════════════════════════════════════════════════════════════════
  deploy:
    name: 🚀 النشر على GitHub Pages
    runs-on: ubuntu-latest
    needs: validate
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 📥 Checkout المستودع
        uses: actions/checkout@v4

      # ── حقن APP_VERSION إذا لزم ──────────────────────────────────
      # الملف المُصدَّر يحتوي أصلاً على APP_VERSION بقيمة timestamp
      # نحقن فقط إذا طُلب ذلك يدوياً أو إذا كانت القيمة فارغة
      - name: 🏷️ ضبط APP_VERSION (إذا لزم)
        run: |
          BUILD_TS=$(date +%s)000

          # إذا طلب المستخدم تجاوز الإصدار يدوياً
          FORCE="${{ github.event.inputs.force_version }}"
          if [ -n "$FORCE" ]; then
            sed -i "s/var APP_VERSION='[^']*'/var APP_VERSION='${BUILD_TS}'/g" index.html
            echo "✅ تم تجاوز APP_VERSION بـ: ${BUILD_TS}"
            exit 0
          fi

          # إذا كان APP_VERSION فارغاً أو لم يُعيَّن بعد (حالة نادرة)
          if grep -qE "var APP_VERSION\s*=\s*''" index.html; then
            sed -i "s/var APP_VERSION=''/var APP_VERSION='${BUILD_TS}'/g" index.html
            echo "✅ تم حقن APP_VERSION تلقائياً: ${BUILD_TS}"
          else
            CURRENT=$(grep -oE "APP_VERSION='[0-9]+'" index.html | head -1 || echo "غير محدد")
            echo "ℹ️  APP_VERSION مُعيَّن من الأدمن: ${CURRENT} — لم يتم التغيير"
          fi

      # ── إنشاء ملف .nojekyll لمنع GitHub Pages من معالجة الملفات ──
      - name: 📄 إنشاء .nojekyll
        run: |
          touch .nojekyll
          echo "✅ .nojekyll created — GitHub Pages لن يعالج الملفات بـ Jekyll"

      # ── إنشاء _headers لـ Cloudflare Pages / Netlify (اختياري) ───
      # ملاحظة: GitHub Pages الاعتيادي لا يدعم هذا الملف، لكنه مفيد
      # إذا قررت لاحقاً الانتقال إلى Cloudflare Pages أو Netlify
      - name: 📋 إنشاء _headers
        run: |
          cat > _headers << 'HEADERS_EOF'
          /*
            Cache-Control: no-cache, no-store, must-revalidate
            Pragma: no-cache
            Expires: 0
            X-Content-Type-Options: nosniff
            X-Frame-Options: SAMEORIGIN
            Referrer-Policy: strict-origin-when-cross-origin

          /index.html
            Cache-Control: no-cache, no-store, must-revalidate
            Pragma: no-cache
            Expires: 0
          HEADERS_EOF
          echo "✅ _headers created"

      # ── طباعة ملخص النشر ─────────────────────────────────────────
      - name: 📊 ملخص النشر
        run: |
          echo "══════════════════════════════════════════"
          echo "  AFM MCQs BOT — ملخص النشر"
          echo "══════════════════════════════════════════"
          echo "  📅 وقت النشر: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "  📦 حجم index.html: $(wc -c < index.html | tr -d ' ') بايت"
          APP_VER=$(grep -oE "APP_VERSION='[^']*'" index.html | head -1 | grep -oE "'[^']*'" | tr -d "'")
          echo "  🏷️  APP_VERSION: ${APP_VER}"
          SEED_STATUS=$(grep -q "var __SEED__=null;" index.html && echo "بدون أسئلة (نموذجية فقط)" || echo "تحتوي أسئلة مضمّنة ✅")
          echo "  📚 حالة الأسئلة: ${SEED_STATUS}"
          echo "  🔗 Branch: ${{ github.ref_name }}"
          echo "  👤 بواسطة: ${{ github.actor }}"
          echo "══════════════════════════════════════════"
          echo "  🔄 آلية التحديث للمستخدمين:"
          echo "     كل مستخدم يفتح الصفحة سيتحقق التطبيق"
          echo "     من APP_VERSION، وإذا تغيّر يُعيد التحميل"
          echo "     تلقائياً ← جميع المستخدمين يحصلون على"
          echo "     الأسئلة الجديدة فور فتح التطبيق ✅"
          echo "══════════════════════════════════════════"

      # ── إعداد GitHub Pages ───────────────────────────────────────
      - name: ⚙️ إعداد GitHub Pages
        uses: actions/configure-pages@v4

      # ── رفع ملفات الموقع كـ artifact ──────────────────────────────
      - name: 📤 رفع ملفات الموقع
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      # ── النشر الفعلي ──────────────────────────────────────────────
      - name: 🌐 النشر على GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # ── رسالة نجاح ───────────────────────────────────────────────
      - name: 🎉 تم النشر بنجاح
        run: |
          echo "✅ تم نشر AFM MCQs BOT على GitHub Pages"
          echo "🔗 الرابط: ${{ steps.deployment.outputs.page_url }}"
          echo ""
          echo "📢 جميع المستخدمين سيحصلون على التحديث"
          echo "   تلقائياً عند فتح التطبيق (بدون أي إجراء منهم)"
