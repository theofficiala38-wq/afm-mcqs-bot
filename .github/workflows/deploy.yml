name: نشر الموقع على GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:   # تشغيل يدوي من واجهة GitHub

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: سحب الكود
        uses: actions/checkout@v4

      - name: تنظيف البيانات الحساسة ونشر index.html فقط
        run: |
          python3 - << 'PYEOF'
          import re, os, sys, shutil, time

          src = "index.html"
          if not os.path.exists(src):
              print(f"❌ الملف {src} غير موجود في رووت الريبوزيتوري")
              sys.exit(1)

          with open(src, "r", encoding="utf-8") as f:
              html = f.read()

          original = html

          # مسح قيمة GH_ENCRYPTED
          patterns = [
              r"""((?:var|let|const)\s+GH_ENCRYPTED\s*=\s*')((?:[^'\\]|\\.)*)('(?:\s*;)?)""",
              r'''((?:var|let|const)\s+GH_ENCRYPTED\s*=\s*")((?:[^"\\]|\\.)*)(")''',
          ]
          found = False
          for pat in patterns:
              new_html, count = re.subn(pat, r"\g<1>\g<3>", html, flags=re.DOTALL)
              if count > 0:
                  html = new_html
                  found = True
                  print(f"✅ تم مسح GH_ENCRYPTED ({count} تكرار)")
          if not found:
              print("ℹ️  لم يُعثر على قيمة في GH_ENCRYPTED")

          # تحديث APP_VERSION
          timestamp = str(int(time.time() * 1000))
          html, count_ver = re.subn(
              r"""((?:var|let|const)\s+APP_VERSION\s*=\s*['"])[^'"]*(['"])""",
              r"\g<1>" + timestamp + r"\g<2>",
              html
          )
          if count_ver:
              print(f"✅ تم تحديث APP_VERSION إلى {timestamp}")
          else:
              print("⚠️  لم يُعثر على APP_VERSION")

          # منع الـ cache
          no_cache = (
              '<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">\n'
              '    <meta http-equiv="Pragma" content="no-cache">\n'
              '    <meta http-equiv="Expires" content="0">'
          )
          if 'Cache-Control' not in html:
              html = html.replace('<head>', '<head>\n    ' + no_cache, 1)
              print("✅ تمت إضافة no-cache headers")

          # ── إلغاء Service Worker عند جميع الأجهزة ────────────────────────
          # يُضاف قبل </head> مباشرةً ليُنفَّذ قبل أي كود آخر
          sw_kill = (
              '<script>'
              'if("serviceWorker"in navigator){'
              'navigator.serviceWorker.getRegistrations().then(function(r){'
              'r.forEach(function(sw){sw.unregister();});'
              '});'
              # إزالة الـ cache الخاص بالـ Service Worker أيضاً
              'if(window.caches){'
              'caches.keys().then(function(k){k.forEach(function(n){caches.delete(n);});});'
              '}}'
              '</script>'
          )
          html = html.replace('</head>', sw_kill + '\n</head>', 1)
          print("✅ تمت إضافة Service Worker killer")
          # ────────────────────────────────────────────────────────────────

          # التحقق النهائي
          leak_check = re.search(
              r"""(?:var|let|const)\s+GH_ENCRYPTED\s*=\s*(?:'[^']{4,}'|"[^"]{4,}")""",
              html, re.DOTALL
          )
          if leak_check:
              print("❌ خطأ حرج: لا تزال توجد قيمة غير فارغة في GH_ENCRYPTED!")
              sys.exit(1)
          else:
              print("✅ التحقق اجتاز — الملف نظيف")

          # ── إنشاء sw.js يلغي نفسه (يستبدل السيرفس ووركر القديم) ──────────
          sw_content = (
              "// Service Worker يلغي نفسه لإجبار المتصفح على تحميل النسخة الجديدة\n"
              "self.addEventListener('install', function() { self.skipWaiting(); });\n"
              "self.addEventListener('activate', function() {\n"
              "  self.registration.unregister().then(function() {\n"
              "    return self.clients.matchAll({ type: 'window' });\n"
              "  }).then(function(clients) {\n"
              "    clients.forEach(function(c) { c.navigate(c.url); });\n"
              "  });\n"
              "});\n"
          )

          out_dir = "_clean_deploy"
          os.makedirs(out_dir, exist_ok=True)

          with open(os.path.join(out_dir, "index.html"), "w", encoding="utf-8") as f:
              f.write(html)

          # نكتب sw.js في أكثر من مسار شائع لضمان الإلغاء
          for sw_path in ["sw.js", "service-worker.js", "serviceworker.js"]:
              with open(os.path.join(out_dir, sw_path), "w", encoding="utf-8") as f:
                  f.write(sw_content)
          print("✅ تم إنشاء ملفات sw.js للقضاء على السيرفس ووركر القديم")
          # ────────────────────────────────────────────────────────────────

          print(f"📦 الملف النظيف جاهز في {out_dir}/")
          PYEOF

      - name: نشر على gh-pages (حذف القديم كامل وبدء من الصفر)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_clean_deploy
          publish_branch: gh-pages
          commit_message: "🚀 نشر آمن — ${{ github.sha }}"
          force_orphan: true
          keep_files: false
