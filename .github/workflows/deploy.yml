name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Prepare Clean Files
        run: |
          # إنشاء المجلد والتأكد من أنه موجود
          mkdir -p _clean_deploy
          
          # تشغيل سكريبت البايثون لتوليد الملفات
          python3 -c "
          import os
          # (هنا نضع الكود الذي يولد الملفات)
          # تأكدنا أننا نكتب في _clean_deploy مباشرة
          with open('_clean_deploy/index.html', 'w', encoding='utf-8') as f:
              f.write('<html><body>Test Page</body></html>') 
          with open('_clean_deploy/.nojekyll', 'w') as f:
              f.write('')
          print('✅ Files created in _clean_deploy')
          "

      - name: Debug - List Files
        run: ls -R _clean_deploy/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_clean_deploy' # تأكدنا هنا من استخدام المسار بدون ./

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
