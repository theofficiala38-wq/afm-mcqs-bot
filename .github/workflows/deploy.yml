name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Deployment Folder
        run: |
          mkdir -p _clean_deploy
          # نسخ كل الملفات عدا المجلدات غير الضرورية
          cp -r ./* _clean_deploy/
          rm -rf _clean_deploy/_clean_deploy
          rm -rf _clean_deploy/.git
          rm -rf _clean_deploy/.github

      - name: Clean and Prepare index.html
        run: |
          python3 - << 'PYEOF'
          import re, os, time

          src = "_clean_deploy/index.html"
          with open(src, "r", encoding="utf-8") as f:
              html = f.read()

          # 1. إزالة GH_ENCRYPTED (بشكل أكثر دقة)
          html = re.sub(r"(var|let|const)\s+GH_ENCRYPTED\s*=\s*['\"].*?['\"](\s*;)?", r"\1 GH_ENCRYPTED = ''\2", html)

          # 2. تحديث APP_VERSION
          timestamp = str(int(time.time() * 1000))
          html = re.sub(r"((?:var|let|const)\s+APP_VERSION\s*=\s*['\"])[^'\"]*(['\"])", r"\g<1>" + timestamp + r"\g<2>", html)

          # 3. إزالة أي سكربت SW قديم
          html = re.sub(r'<script src=["\']sw-reg\.js\?v=.*?["\']></script>', '', html)
          
          # 4. إضافة رابط لملف التسجيل الخارجي قبل </body>
          reg_tag = f'<script src="sw-reg.js?v={timestamp}"></script>'
          html = html.replace('</body>', reg_tag + '\n</body>')

          with open(src, "w", encoding="utf-8") as f:
              f.write(html)

          # 5. إنشاء ملف التسجيل الخارجي (sw-reg.js)
          reg_content = f"""
          if ('serviceWorker' in navigator) {{
            navigator.serviceWorker.register('sw.js?v={timestamp}')
              .then(reg => {{
                reg.onupdatefound = () => {{
                  const installingWorker = reg.installing;
                  installingWorker.onstatechange = () => {{
                    if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {{
                      window.location.reload(true);
                    }}
                  }};
                }};
              }});
          }}
          """
          with open("_clean_deploy/sw-reg.js", "w", encoding="utf-8") as f:
              f.write(reg_content)

          # 6. إنشاء ملف الـ Service Worker (sw.js)
          sw_content = f"""
          var SW_VERSION='{timestamp}';
          self.addEventListener('install', e => e.waitUntil(self.skipWaiting()));
          self.addEventListener('activate', e => e.waitUntil(caches.keys().then(k => Promise.all(k.map(c => caches.delete(c)))).then(() => self.clients.claim())));
          self.addEventListener('fetch', e => {{
            if (e.request.mode === 'navigate') {{
              e.respondWith(fetch(e.request, {{cache:'no-store'}}).catch(() => caches.match(e.request) || new Response('Offline', {{status:503}})));
            }}
          }});
          """
          with open("_clean_deploy/sw.js", "w", encoding="utf-8") as f:
              f.write(sw_content)
              
          with open("_clean_deploy/.nojekyll", "w") as f:
              f.write("")
          PYEOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_clean_deploy'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
