name: نشر الموقع على GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:   # تشغيل يدوي من واجهة GitHub

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: سحب الكود
        uses: actions/checkout@v4

      - name: تنظيف البيانات الحساسة وتحضير الملفات للنشر
        run: |
          python3 - << 'PYEOF'
          import re, os, sys, shutil, time

          src = "index.html"
          if not os.path.exists(src):
              print(f"❌ الملف {src} غير موجود في رووت الريبوزيتوري")
              sys.exit(1)

          with open(src, "r", encoding="utf-8") as f:
              html = f.read()

          original = html

          # مسح قيمة GH_ENCRYPTED لعدم تسريب التوكن على النسخة العامة المنشورة
          patterns = [
              r"((?:var|let|const)\s+GH_ENCRYPTED\s*=\s*')((?:[^'\\]|\\.)*)('(?:\s*;)?)",
              r'((?:var|let|const)\s+GH_ENCRYPTED\s*=\s*")((?:[^"\\]|\\.)*)("(?:\s*;)?))'
          ]
          
          found = False
          for pat in patterns:
              new_html, count = re.subn(pat, r"\g<1>\g<3>", html, flags=re.DOTALL)
              if count > 0:
                  html = new_html
                  found = True
                  print(f"✅ تم مسح GH_ENCRYPTED ({count} تكرار)")
          if not found:
              print("ℹ️  لم يُعثر على قيمة في GH_ENCRYPTED")

          # تحديث APP_VERSION لمنع التخزين المؤقت للمتصفحات
          timestamp = str(int(time.time() * 1000))
          html, count_ver = re.subn(
              r"((?:var|let|const)\s+APP_VERSION\s*=\s*['\"])[^'\"]*(['\"])",
              r"\g<1>" + timestamp + r"\g<2>",
              html
          )
          if count_ver:
              print(f"✅ تم تحديث APP_VERSION إلى {timestamp}")
          else:
              print("⚠️  لم يُعثر على APP_VERSION")

          # منع الـ cache على مستوى الـ meta tags
          no_cache = (
              '<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">\n'
              '    <meta http-equiv="Pragma" content="no-cache">\n'
              '    <meta http-equiv="Expires" content="0">'
          )
          if 'Cache-Control' not in html:
              html = html.replace('<head>', '<head>\n    ' + no_cache, 1)
              print("✅ تمت إضافة no-cache headers")

          # إزالة أي سكريبت SW قديم لتجنب التكرار والتداخل
          html = re.sub(r'<script>[^<]*serviceWorker[^<]*</script>\n?', '', html)
          print("✅ تم تنظيف أي SW script قديم")

          # تسجيل Service Worker لضمان جلب الصفحة دائماً من السيرفر مش من الكاش
          sw_script = f'''<script>
          if ('serviceWorker' in navigator) {{
            navigator.serviceWorker.register('sw.js?v={timestamp}')
              .then(reg => {{
                reg.onupdatefound = () => {{
                  const installingWorker = reg.installing;
                  installingWorker.onstatechange = () => {{
                    if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {{
                      window.location.reload(true);
                    }}
                  }};
                }};
              }});
          }}
          </script>'''
          html = html.replace('</body>', sw_script + '\n</body>')

          sw_content = (
              f"// {timestamp} - تجنب الكاش\n"
              f"var SW_VERSION='{timestamp}';\n"
              "self.addEventListener('install',function(e){\n"
              "  e.waitUntil(self.skipWaiting());\n"
              "});\n"
              "self.addEventListener('activate',function(e){\n"
              "  e.waitUntil(\n"
              "    caches.keys().then(function(keys){\n"
              "      return Promise.all(keys.map(function(k){return caches.delete(k);}));\n"
              "    }).then(function(){return self.clients.claim();})\n"
              "  );\n"
              "});\n"
              "self.addEventListener('fetch',function(e){\n"
              "  if(e.request.mode==='navigate'){\n"
              "    e.respondWith(\n"
              "      fetch(e.request,{cache:'no-store'})\n"
              "        .catch(function(){\n"
              "          return caches.match(e.request)||new Response('Offline',{status:503});\n"
              "        })\n"
              "    );\n"
              "  }\n"
              "});\n"
          )

          out_dir = "_clean_deploy"
          os.makedirs(out_dir, exist_ok=True)

          with open(os.path.join(out_dir, "index.html"), "w", encoding="utf-8") as f:
              f.write(html)

          for sw_path in ["sw.js", "service-worker.js"]:
              with open(os.path.join(out_dir, sw_path), "w", encoding="utf-8") as f:
                  f.write(sw_content)
          
          # إنشاء ملف لمنع معالجة جيكيل للملفات لضمان عدم حدوث أخطاء صامتة
          with open(os.path.join(out_dir, ".nojekyll"), "w") as f:
              f.write("")

          print(f"📦 الملف النظيف جاهز في مجلد {out_dir}/")
          PYEOF

      # --- الأجزاء التي كانت مفقودة لحل المشكلة بالكامل ---
      
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_clean_deploy'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
