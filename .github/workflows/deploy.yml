name: 🚀 Deploy AFM MCQs BOT

on:
  push:
    branches:
      - main
      - master
    paths:
      - "index.html"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  validate:
    name: ✅ فحص الملف
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 فحص حجم الملف
        run: |
          if [ ! -f "index.html" ]; then
            echo "❌ index.html غير موجود!"
            exit 1
          fi
          SIZE=$(wc -c < index.html)
          echo "📦 الحجم: ${SIZE} بايت"
          if [ "$SIZE" -lt 51200 ]; then
            echo "❌ الملف صغير جداً (${SIZE} بايت)"
            exit 1
          fi
          echo "✅ الحجم مقبول"

      - name: 🔍 فحص بنية التطبيق
        run: |
          FAILED=0
          for marker in "AFM MCQs BOT" "APP_VERSION" "publishToGitHub"; do
            if grep -q "$marker" index.html; then
              echo "✅ $marker"
            else
              echo "❌ مفقود: $marker"
              FAILED=1
            fi
          done
          [ "$FAILED" -eq 1 ] && exit 1
          echo "✅ بنية التطبيق سليمة"

      - name: 📚 فحص الأسئلة (تحذير فقط)
        run: |
          if grep -q "var __SEED__=null;" index.html; then
            echo "⚠️  تحذير: __SEED__ = null — لا توجد أسئلة مضمّنة"
            echo "   سيعمل الموقع بالأسئلة النموذجية حتى تضيف أسئلتك"
            echo ""
            echo "📋 لإضافة أسئلتك:"
            echo "   1. افتح رابط الموقع المنشور (GitHub Pages)"
            echo "   2. أدخل كلمة سر الأدمن"
            echo "   3. ارفع أسئلتك عبر /upload"
            echo "   4. اضغط 'نشر على GitHub'"
          else
            echo "✅ الملف يحتوي أسئلة مضمّنة"
          fi

  deploy:
    name: 🚀 النشر على GitHub Pages
    runs-on: ubuntu-latest
    needs: validate
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📄 إنشاء .nojekyll
        run: touch .nojekyll

      - name: ℹ️ معلومات النشر
        run: |
          echo "📅 $(date -u '+%Y-%m-%d %H:%M UTC')"
          echo "📦 $(wc -c < index.html) بايت"
          VER=$(grep -oE "APP_VERSION='[^']*'" index.html | head -1 | grep -oE "'[^']*'" | tr -d "'" || echo "")
          echo "🏷️  APP_VERSION: ${VER}"
          grep -q "var __SEED__=null;" index.html && echo "⚠️  بدون أسئلة" || echo "✅ يحتوي أسئلة"

      - name: ⚙️ إعداد GitHub Pages
        uses: actions/configure-pages@v4

      - name: 📤 رفع الملفات
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: 🌐 النشر
        id: deployment
        uses: actions/deploy-pages@v4

      - name: 🎉 تم
        run: echo "✅ ${{ steps.deployment.outputs.page_url }}"
