name: 🔔 فحص بعد رفع الأدمن

on:
  push:
    branches:
      - main
      - master
    paths:
      - "index.html"

jobs:
  quick-check:
    name: ⚡ فحص سريع
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚡ فحص سريع
        run: |
          SIZE=$(wc -c < index.html)
          echo "📦 الحجم: ${SIZE} بايت"

          if [ "$SIZE" -lt 51200 ]; then
            echo "❌ الملف صغير جداً"
            exit 1
          fi

          if grep -q "var __SEED__=null;" index.html; then
            echo "❌ __SEED__ = null — الملف بدون أسئلة"
            echo "   افتح التطبيق وأعد النشر عبر 'نشر على GitHub'"
            exit 1
          fi

          VER=$(grep -oE "APP_VERSION='[^']*'" index.html | head -1 | grep -oE "'[^']*'" | tr -d "'" || echo "")
          echo "✅ الملف صالح"
          echo "🏷️  APP_VERSION: ${VER}"
          echo "📚 الأسئلة مضمّنة ✅"
          echo ""
          echo "🔄 المستخدمون سيحصلون على التحديث تلقائياً عند فتح التطبيق"
